<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <linearGradient id="rocket" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="90" cy="100" r="2" fill="#fbbf24" opacity="0.4"/>
  <circle cx="420" cy="80" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="440" cy="380" r="2" fill="#fbbf24" opacity="0.3"/>
  <circle cx="70" cy="350" r="1.5" fill="#fff" opacity="0.4"/>
  <!-- Speed lines -->
  <line x1="60" y1="280" x2="180" y2="295" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
  <line x1="60" y1="300" x2="160" y2="312" stroke="#fbbf24" stroke-width="1" opacity="0.15"/>
  <line x1="60" y1="320" x2="150" y2="330" stroke="#fbbf24" stroke-width="1" opacity="0.1"/>
  <!-- Trail -->
  <polygon points="220,420 256,280 292,420" fill="url(#trail)" filter="url(#glow)"/>
  <!-- Rocket body -->
  <g transform="rotate(-45,256,256)" filter="url(#glow)">
    <ellipse cx="256" cy="256" rx="36" ry="80" fill="url(#rocket)"/>
    <ellipse cx="256" cy="182" rx="20" ry="30" fill="#fef9c3"/>
    <rect x="224" y="290" width="24" height="30" rx="4" fill="#f59e0b"/>
    <rect x="264" y="290" width="24" height="30" rx="4" fill="#f59e0b"/>
    <circle cx="256" cy="240" r="14" fill="#0a0a14" opacity="0.5"/>
    <circle cx="256" cy="240" r="9" fill="#7dd3fc" opacity="0.9"/>
  </g>
  <!-- Glow halo -->
  <circle cx="256" cy="256" r="110" fill="#fbbf24" opacity="0.04" filter="url(#bigglow)"/>
  <!-- Rank badge -->
  <circle cx="370" cy="160" r="44" fill="#0a0a14" stroke="#fbbf24" stroke-width="3"/>
  <polygon points="370,138 377,158 400,158 382,170 389,190 370,178 351,190 358,170 340,158 363,158" fill="#fbbf24"/>
</svg>
