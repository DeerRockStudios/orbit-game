<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ORBIT">
<meta name="description" content="Orbit. Jump. Survive. The most addictive 1-tap space game. How far can you go?">
<meta property="og:title" content="ORBIT — 1-Tap Space Game">
<meta property="og:description" content="Orbit. Jump. Survive. How far can you go?">
<meta property="og:type" content="website">
<meta property="og:image" content="icon-512.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="ORBIT — 1-Tap Space Game">
<meta name="twitter:description" content="Orbit. Jump. Survive. How far can you go?">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ORBIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;-ms-user-select:none;user-select:none;-webkit-touch-callout:none}
input,textarea{user-select:text;-webkit-user-select:text}
body{overflow:hidden;font-family:'Space Grotesk',system-ui,sans-serif;touch-action:none;transition:background .6s,color .6s}
canvas{display:block;position:absolute;inset:0;touch-action:none;z-index:0}
#hud{position:absolute;top:0;left:0;width:100%;text-align:center;padding-top:26px;pointer-events:none;z-index:2}
#sc{font-size:56px;font-weight:100;letter-spacing:-2px;display:none;pointer-events:none;cursor:default;text-shadow:0 1px 8px rgba(0,0,0,.15)}
#co{font-size:12px;letter-spacing:4px;opacity:0;transition:opacity .4s;margin-top:2px}
#coins-hud{position:absolute;top:26px;right:16px;font-size:13px;display:none;pointer-events:none;z-index:2}
#pause-btn{position:absolute;top:22px;left:16px;width:36px;height:36px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:none;z-index:2}
.scr{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;z-index:1}
.scr.on{display:flex}
.btn{border:none;border-radius:32px;cursor:pointer;font-family:'Space Grotesk',inherit;letter-spacing:2px;font-size:12px;font-weight:600;transition:transform .15s,box-shadow .2s;padding:12px 24px}
.btn:active{transform:scale(.93)}
.btn-play{background:linear-gradient(135deg,#7c3aed 0%,#a855f7 50%,#fbbf24 100%)!important;color:#fff!important;font-size:15px!important;padding:18px!important;letter-spacing:5px!important;font-weight:700!important;box-shadow:0 0 32px rgba(124,58,237,.4),0 4px 24px rgba(0,0,0,.35)!important;border:none!important}
.btn-play:active{transform:scale(.95)!important;box-shadow:0 0 16px rgba(124,58,237,.3)!important}
.bsm{padding:10px 22px;font-size:11px;font-weight:600}
.btn-icon{width:38px;height:38px;padding:0!important;display:inline-flex;align-items:center;justify-content:center;font-size:16px;border-radius:50%!important}
.nav{display:flex;border-radius:14px;padding:4px;margin-bottom:16px;width:100%}
.nt{flex:1;padding:9px 4px;text-align:center;border-radius:10px;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;opacity:.5;font-weight:600}
.nt.on{opacity:1;font-weight:700}
.scroll{width:100%;max-height:48vh;overflow-y:auto}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.si{border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:border .18s;border-width:1px;border-style:solid}
.si.owned{border-color:#6ee7b7!important}.si.sel{border-color:#fbbf24!important;border-width:2px!important}
.stg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;margin:10px 0}
.sb{border-radius:12px;padding:12px 8px;text-align:center}
.sn{font-size:22px;font-weight:300;color:#fbbf24}.sl{font-size:10px;letter-spacing:2px;margin-top:3px;opacity:.45}
.row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom-width:1px;border-bottom-style:solid}
#toast{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);border-radius:24px;padding:11px 24px;font-size:12px;letter-spacing:1px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;max-width:90vw;word-break:break-word;backdrop-filter:blur(12px)}
.spin-sector-label{font-family:'Space Grotesk',sans-serif;font-weight:700}
#spin-canvas-wrap{position:relative;width:260px;height:260px;margin:0 auto 16px}
#spin-pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:22px solid #fbbf24;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));z-index:2}
@keyframes spinBtnPulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.4)}50%{box-shadow:0 0 0 8px rgba(251,191,36,0)}}
.lang-switch{display:flex;align-items:center;border-radius:20px;overflow:hidden;border-width:1px;border-style:solid}
.lang-opt{padding:7px 16px;font-size:11px;letter-spacing:3px;cursor:pointer;transition:all .2s}
input{width:100%;padding:12px 16px;border-radius:12px;border-width:1px;border-style:solid;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;transition:all .3s}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border:none;border-radius:32px;font-size:13px;letter-spacing:1px;cursor:pointer;font-family:inherit;margin-bottom:8px}
.social-btn:active{transform:scale(.95)}
.div-line{display:flex;align-items:center;gap:10px;width:100%;margin:10px 0}
.div-line::before,.div-line::after{content:'';flex:1;height:1px;background:rgba(128,128,128,.2)}
.div-line span{font-size:11px;letter-spacing:2px;opacity:.35}
#scr-auth.on,#scr-guest.on{background:#0a0a14}
#scr-shop.on,#scr-profile.on,#scr-dead.on,#scr-pause.on{background:var(--scr-bg,#0a0a14)}
@keyframes bk{0%,100%{opacity:.2}50%{opacity:.5}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes tutBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes milestoneFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}40%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}}
@keyframes coinFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
@keyframes shareSlideUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
.bk{animation:bk 2s ease-in-out infinite}
#tut-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:15;pointer-events:none}
#tut-overlay.on{display:flex}
.tut-arrow{animation:tutBob 1s ease-in-out infinite}
.milestone-pop{position:absolute;top:50%;left:50%;pointer-events:none;z-index:20;animation:milestoneFlash 1.8s ease-out forwards;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="sc">0</div><div id="co"></div></div>
<div id="coins-hud">★ <span id="cv">0</span></div>
<button id="pause-btn" onclick="togglePause()">II</button>
<div id="toast"></div>
<div id="tut-overlay"></div>

<!-- AUTH -->
<div class="scr on" id="scr-auth">
  <div style="font-size:46px;font-weight:100;letter-spacing:12px;margin-bottom:4px">ORBIT</div>
  <div id="a-tag" class="bk" style="font-size:11px;letter-spacing:5px;margin-bottom:48px;opacity:.35">tap · hold for power</div>
  <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px">
    <button class="social-btn" style="background:#fff;color:#333" onclick="authGoogle()">
      <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span id="a-google">Continue with Google</span>
    </button>
    <button class="social-btn" style="background:#1877F2;color:#fff;display:none" onclick="authFB()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      <span id="a-fb">Continue with Facebook</span>
    </button>
    <button class="btn bsm" id="a-guest" onclick="authGuest()" style="opacity:.5;margin-top:4px;letter-spacing:2px">Play as guest</button>
  </div>
  <div style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%)">
    <div class="lang-switch" id="auth-lsw">
      <div class="lang-opt on" id="ls-en" onclick="setLang('en')">EN</div>
      <div class="lang-opt" id="ls-es" onclick="setLang('es')">ES</div>
    </div>
  </div>
</div>

<!-- GUEST SETUP -->
<div class="scr" id="scr-guest">
  <div style="font-size:22px;font-weight:200;letter-spacing:6px;margin-bottom:6px">ORBIT</div>
  <div id="gs-sub" style="font-size:11px;letter-spacing:3px;opacity:.4;margin-bottom:32px">set up your profile</div>
  <div style="width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px">
    <!-- avatar picker -->
    <div style="display:flex;justify-content:center;margin-bottom:8px">
      <div id="gs-av" onclick="document.getElementById('gs-photo').click()" style="width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;border:2px dashed rgba(128,128,128,.3)">👤</div>
      <input type="file" id="gs-photo" accept="image/*" style="display:none" onchange="handleGuestPhoto(this)">
    </div>
    <input type="text" id="gs-nick" maxlength="16" placeholder="choose a username">
    <div id="gs-nick-status" style="font-size:11px;letter-spacing:2px;opacity:.5;margin-top:-6px;text-align:center"></div>
    <button class="btn" id="gs-save" onclick="saveGuestProfile()" style="padding:13px;font-weight:700">ENTER ORBIT</button>
  </div>
</div>

<!-- HOME -->
<div class="scr" id="scr-home">
  <div style="font-size:50px;font-weight:100;letter-spacing:14px;margin-bottom:6px">ORBIT</div>
  <div id="h-hint" class="bk" style="font-size:11px;letter-spacing:5px;opacity:.35;margin-bottom:44px">tap · hold for power</div>
  <div style="text-align:center;margin-bottom:28px">
    <div id="h-best-lbl" style="font-size:10px;letter-spacing:4px;opacity:.3;margin-bottom:5px">BEST</div>
    <div id="h-best" style="font-size:34px;font-weight:100;color:#fbbf24">0</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:11px;width:100%;max-width:280px">
    <div id="daily-challenge" style="display:none;width:100%;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15);border-radius:12px;padding:10px 14px;margin-bottom:6px"></div>
    <div id="mode-selector" style="display:flex;gap:0;border-radius:24px;overflow:hidden;width:100%;border:1px solid rgba(128,128,128,.2)">
      <div id="mode-easy" onclick="setGameMode('easy')" style="flex:1;padding:9px 4px;text-align:center;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;opacity:.45" id-label="modeNormal">NORMAL</div>
      <div id="mode-normal" onclick="setGameMode('normal')" style="flex:1;padding:9px 4px;text-align:center;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;opacity:1;font-weight:600" id-label="modeComp">COMPETITIVE</div>
    </div>
    <div id="mode-desc" style="font-size:10px;letter-spacing:1px;opacity:.4;margin-bottom:6px;text-align:center;min-height:14px"></div>
    <button class="btn btn-play" id="h-play" onclick="startGame()">PLAY</button>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <button class="btn bsm" id="h-top" onclick="showScr('leaderboard')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:4px"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>TOP</button>
      <button class="btn bsm" id="h-shop" onclick="showScr('shop')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:4px"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>SHOP</button>
      <button class="btn bsm" id="h-prof" onclick="showScr('profile')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:4px"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>PROFILE</button>
    </div>
  </div>
  <div style="position:absolute;top:18px;right:16px;display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 12px">
    <span style="color:#fbbf24">★</span><span id="h-coins" style="color:#fbbf24;font-size:13px;font-weight:600">0</span>
  </div>
  <div style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:12px">
    <div id="theme-sw" style="display:flex;gap:6px;background:rgba(128,128,128,.12);border-radius:24px;padding:5px">
      <div onclick="toggleSound()" id="snd-toggle" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .2s;opacity:.6">♫</div>
      <div onclick="setThemeMode('light')" id="tm-light" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s">☀️</div>
      <div onclick="setThemeMode('auto')" id="tm-auto" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s">⚡</div>
      <div onclick="setThemeMode('dark')" id="tm-dark" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s">🌙</div>
    </div>
    <div class="lang-switch" id="home-lsw">
      <div class="lang-opt on" id="hls-en" onclick="setLang('en')">EN</div>
      <div class="lang-opt" id="hls-es" onclick="setLang('es')">ES</div>
    </div>
  </div>
</div>

<!-- DEAD -->
<div class="scr" id="scr-dead" style="justify-content:flex-start;padding-top:36px;overflow-y:auto">
  <div id="d-title" style="font-size:24px;font-weight:200;letter-spacing:6px;margin-bottom:12px">CRASH</div>
  <div style="display:flex;gap:10px;margin-bottom:12px">
    <div class="sb" style="min-width:72px;border-radius:14px;padding:12px 16px"><div id="d-score" style="font-size:26px;font-weight:200;color:#fbbf24">0</div><div id="d-sc-lbl" class="sl">SCORE</div></div>
    <div class="sb" style="min-width:72px;border-radius:14px;padding:12px 16px"><div id="d-best" style="font-size:26px;font-weight:200;color:#fbbf24">0</div><div id="d-best-lbl" class="sl">BEST</div></div>
    <div class="sb" style="min-width:72px;border-radius:14px;padding:12px 16px"><div id="d-earned" style="font-size:26px;font-weight:200;color:#fbbf24">0</div><div style="font-size:10px;letter-spacing:3px;opacity:.4;margin-top:3px">★</div></div>
  </div>
  <div style="width:100%;margin-bottom:14px">
    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:10px" id="lb-medals"></div>
    <div style="text-align:center;margin-bottom:6px">
      <button class="btn bsm" id="lb-more-btn" onclick="toggleLbMore()" style="font-size:10px;letter-spacing:2px;opacity:.55;width:100%">▼ SEE MORE</button>
    </div>
    <div id="lb-more-list" style="display:none;margin-bottom:8px"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
      <div class="lang-switch" id="lb-scope-sw" style="font-size:10px">
        <div class="lang-opt on" id="lbs-global" onclick="setLbScope('global',this)">🌍 GLOBAL</div>
        <div class="lang-opt" id="lbs-local" onclick="setLbScope('local',this)">📍 LOCAL</div>
      </div>
      <div id="lb-reset-lbl" style="font-size:10px;opacity:.4;color:#fbbf24"></div>
    </div>
  </div>
  <div id="revive-wrap" style="margin-bottom:10px;text-align:center">
    <button class="btn bsm" id="d-revive" onclick="doRevive()" style="color:#fbbf24;border:1px solid #fbbf2488">WATCH AD — REVIVE</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:12px">
    <button class="btn" id="d-retry" style="padding:16px 48px;font-weight:700;font-size:14px" onclick="startGame()">RETRY</button>
    <button class="btn bsm" id="d-menu" onclick="showScr('home')">MENU</button>
  </div>
  <button class="btn bsm" id="d-share" onclick="shareScore()" style="margin-bottom:14px;letter-spacing:2px;opacity:.7">↗ SHARE</button>
</div>

<!-- PAUSE -->
<div class="scr" id="scr-pause">
  <div id="p-title" style="font-size:22px;font-weight:200;letter-spacing:6px;margin-bottom:22px">PAUSED</div>
  <button class="btn" id="p-resume" style="padding:14px 48px;margin-bottom:10px;font-weight:700" onclick="togglePause()">RESUME</button>
  <button class="btn bsm" id="p-menu" onclick="showScr('home')">MENU</button>
</div>

<!-- SHOP -->
<div class="scr" id="scr-shop">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;width:100%">
    <button class="btn bsm" onclick="showScr('home')">←</button>
    <div id="sh-title" style="font-size:16px;font-weight:300;letter-spacing:4px">SHOP</div>
    <div style="margin-left:auto;border-radius:18px;padding:5px 12px;display:flex;align-items:center;gap:5px">
      <span style="color:#fbbf24">★</span><span id="sh-coins" style="color:#fbbf24;font-size:13px;font-weight:600">0</span>
    </div>
  </div>
  <div class="nav" id="sh-nav">
    <div class="nt on" id="sh-t1" onclick="switchShop('trail',this)">TRAILS</div>
    <div class="nt" id="sh-t2" onclick="switchShop('bundles',this)" id-label="shBundles">BUNDLES</div>
    <div class="nt" id="sh-t3" onclick="switchShop('packs',this)">PACKS</div>
    <div class="nt" id="sh-t4" onclick="openSpin()">⭐</div>
  </div>
  <div class="scroll" id="sh-content"></div>
</div>

<!-- PROFILE -->
<div class="scr" id="scr-profile">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;width:100%">
    <button class="btn bsm" onclick="showScr('home')">←</button>
    <div id="pr-title" style="font-size:16px;font-weight:300;letter-spacing:4px">PROFILE</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;width:100%">
    <div style="position:relative">
      <div id="pr-av" style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0"></div>
      <div id="pr-flag" style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);font-size:14px;line-height:1"></div>
    </div>
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:8px">
        <div id="pr-nick" style="font-size:16px;font-weight:400"></div>
        <button onclick="startEditNick()" id="pr-edit-nick" style="background:none;border:none;cursor:pointer;font-size:14px;opacity:.5;padding:2px 6px">✏️</button>
      </div>
      <div id="pr-nick-edit" style="display:none;margin-top:6px">
        <input type="text" id="pr-nick-inp" maxlength="16" style="margin-bottom:6px;padding:8px 12px;font-size:13px">
        <div style="display:flex;gap:6px">

function resolveNight(){
  var m=S.themeMode||'auto';
  if(m==='dark')return true;
  if(m==='light')return false;
  var h=new Date().getHours();
  return h>=20||h<7;
}
function applyTheme(){
  document.body.style.background=T.bg;document.body.style.color=T.text;

  ['h-top','h-shop','h-prof','a-login','a-guest','d-menu','p-menu','pr-logout','photo-btn'].forEach(function(id){var e=document.getElementById(id);if(e){e.style.background=T.btn;e.style.color=T.text;e.style.border='1px solid '+T.btnBorder;}});

  document.querySelectorAll('.sb').forEach(function(e){e.style.background=T.card;});

  var toast=document.getElementById('toast');if(toast){toast.style.background=isNight?'rgba(15,15,25,.95)':'rgba(240,235,228,.97)';toast.style.color=T.text;}
}
function setThemeMode(m){
  S.themeMode=m;saveState();

}
function updateThemeSwitcher(){

}

// Share score
function shareScore(){
  var can=document.createElement('canvas');
  can.width=600;can.height=400;
  var c=can.getContext('2d');
  // Background gradient
  var bg=c.createLinearGradient(0,0,600,400);
  bg.addColorStop(0,'#0a0a14');bg.addColorStop(1,'#1a1030');
  c.fillStyle=bg;c.fillRect(0,0,600,400);
  // Decorative orbits
  var cols=['#a78bfa','#6ee7b7','#f9a8d4'];
  for(var i=0;i<3;i++){
    c.beginPath();c.arc(150+i*150,200,60+i*8,0,6.28);
    c.strokeStyle=cols[i]+'44';c.lineWidth=1.5;c.stroke();
    // Orbiting dot
    var da=Date.now()*.001+i*2;
    c.beginPath();c.arc(150+i*150+Math.cos(da)*(60+i*8),200+Math.sin(da)*(60+i*8),4,0,6.28);
    c.fillStyle=cols[i];c.fill();
  }
  // ORBIT title
  c.fillStyle='#ffffff';c.font='100 42px system-ui,sans-serif';c.textAlign='center';
  c.fillText('ORBIT',300,60);
  // Score big
  c.fillStyle='#fbbf24';c.font='100 88px system-ui,sans-serif';
  c.fillText(score,300,200);
  // Rank badge
  var rank=getRank(S.best);
  c.fillStyle='rgba(255,255,255,.5)';c.font='300 16px system-ui,sans-serif';
  c.fillText(rank.icon+' '+rank.name,300,240);
  // Challenge messages
  var challenges=lang==='es'?
    ['¿Puedes superarme?','Te reto a intentarlo','¿Crees que puedes más?','Supera esto si puedes']:
    ['Can you beat me?','I dare you to try','Think you can do better?','Beat this if you can'];
  var challenge=challenges[Math.floor(Math.random()*challenges.length)];
  c.fillStyle='rgba(255,255,255,.4)';c.font='300 15px system-ui,sans-serif';
  c.fillText(challenge,300,310);
  // URL
  c.fillStyle='rgba(255,255,255,.25)';c.font='300 12px system-ui,sans-serif';
  c.fillText('deerrockstudios.github.io/orbit-game',300,380);
  // Combo badge if high
  if(combo>=5){
    c.fillStyle='rgba(251,191,36,.15)';
    c.beginPath();c.roundRect(220,260,160,28,14);c.fill();
    c.fillStyle='#fbbf24';c.font='600 12px system-ui,sans-serif';
    c.fillText('🔥 x'+combo+' COMBO',300,280);
  }

  can.toBlob(function(blob){

      ?'🪐 '+score+' puntos en ORBIT! '+challenge+' 🚀\n'
      :'🪐 '+score+' points in ORBIT! '+challenge+' 🚀\n';
    shareText+=location.href;

    if(navigator.share&&navigator.canShare){
      var file=new File([blob],'orbit-score.png',{type:'image/png'});

function getDailyChallenge(){
  var today=new Date().toISOString().slice(0,10);
  // Seed from date for consistent daily pick
  var seed=0;for(var i=0;i<today.length;i++)seed+=today.charCodeAt(i);
  var idx=seed%CHALLENGES.length;
  var ch=CHALLENGES[idx];
  var data=ch.get();
  return{id:ch.id,text:lang==='es'?ch.es:ch.en,target:data.target,type:data.type,reward:data.reward,date:today};

function checkDailyProgress(type,value){
  if(currentMode==='easy')return; // No challenges in normal/zen mode
  if(!S.dailyChallenge)return;
  var today=new Date().toISOString().slice(0,10);
  if(S.dailyChallenge.date!==today||S.dailyChallenge.done)return;
  var ch=S.dailyChallenge;
  if(ch.type!==type)return;
  if(type==='games'){
    ch.progress=(ch.progress||0)+value;
  }else{
    ch.progress=Math.max(ch.progress||0,value);
  }
  if(ch.progress>=ch.target&&!ch.done){
    ch.done=true;
    S.coins+=ch.reward;
    saveState();
    setTimeout(function(){
      toast(lang==='es'?'🏆 Reto diario completado! +'+ch.reward+' ★':'🏆 Daily challenge complete! +'+ch.reward+' ★');

  }
  saveState();
}

function zenDrone(){

function zenMelody(){

// ── COMPETITIVE MUSIC ──────────────────────────
var compBeatTimer=null;
function startMusic(){
  if(musicPlaying||!AC||!soundEnabled)return;
  stopMenuMusic();musicPlaying=true;
  musicGain=AC.createGain();musicGain.gain.value=0;musicGain.connect(AC.destination);
  musicGain.gain.linearRampToValueAtTime(0.14,AC.currentTime+1.5);
  compBass();compArp();
  var beat=0;
  var bInterval=60000/124; // 124 BPM
  compBeatTimer=setInterval(function(){
    if(!musicPlaying){clearInterval(compBeatTimer);return;}
    compKick(beat);beat=(beat+1)%8;
  },bInterval);
}
function compKick(beat){
  if(!AC||!musicGain)return;
  var now=AC.currentTime;
  if(beat===0||beat===4){ // kick
    var o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.setValueAtTime(140,now);o.frequency.exponentialRampToValueAtTime(38,now+0.12);
    g.gain.setValueAtTime(0.18*masterVolume,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.22);
    o.connect(g);g.connect(musicGain);o.start(now);o.stop(now+0.25);
  }
  if(beat===2||beat===6){ // snare noise burst
    var buf=AC.createBuffer(1,Math.floor(AC.sampleRate*.06),AC.sampleRate);
    var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.5;
    var src=AC.createBufferSource(),hg=AC.createGain(),hf=AC.createBiquadFilter();
    hf.type='bandpass';hf.frequency.value=3000;hf.Q.value=0.8;
    hg.gain.setValueAtTime(0.12*masterVolume,now);hg.gain.exponentialRampToValueAtTime(0.001,now+0.06);
    src.buffer=buf;src.connect(hf);hf.connect(hg);hg.connect(musicGain);src.start(now);
  }
}
function compBass(){
  if(!musicPlaying||!AC)return;
  var bassSeq=[55,55,65.41,55,73.42,55,65.41,82.41];
  var note=bassSeq[Math.floor(Math.random()*bassSeq.length)];
  var o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth';o.frequency.value=note;
  g.gain.setValueAtTime(0,AC.currentTime);
  g.gain.linearRampToValueAtTime(0.07*masterVolume,AC.currentTime+0.04);
  g.gain.linearRampToValueAtTime(0,AC.currentTime+0.45);
  o.connect(g);g.connect(musicGain);o.start();o.stop(AC.currentTime+0.5);
  setTimeout(function(){compBass();},480+Math.random()*80);
}
function compArp(){
  if(!musicPlaying||!AC)return;
  var arp=[329.63,392,440,523.25,587.33,659.25,784];
  var note=arp[Math.floor(Math.random()*arp.length)];

}
function stopMusic(){

function playMenuChord(){

    [[196,246.94,293.66],[220,277.18,329.63],[174.61,220,261.63],[164.81,207.65,246.94]],

  ];

    var o=AC.createOscillator(),g=AC.createGain();

    g.gain.linearRampToValueAtTime(0,AC.currentTime+5);
    o.connect(g);g.connect(menuGain);
    o.start();o.stop(AC.currentTime+5.5);
  });
  setTimeout(function(){playMenuChord();},3500+Math.random()*2500);
}

var SPIN_PRIZES=[
  {label:'25 ★', coins:25,  col:'#6366f1', weight:40},
  {label:'75 ★', coins:75,  col:'#8b5cf6', weight:25},
  {label:'150 ★',coins:150, col:'#a855f7', weight:18},
  {label:'300 ★',coins:300, col:'#ec4899', weight:12},
  {label:'500 ★',coins:500, col:'#fbbf24', weight:4},
  {label:'2× Next',coins:0, col:'#f97316', multiplier:true, weight:1}
];
var spinAngle=0,spinVelocity=0,spinAnimId=null,spinLocked=false;
function getTodayKey(){return new Date().toISOString().slice(0,10);}
function drawSpinWheel(angle){
  var canvas=document.getElementById('spin-canvas');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W=260,R=125,cx=130,cy=130;
  ctx.clearRect(0,0,W,W);
  var n=SPIN_PRIZES.length,arc=(2*Math.PI)/n;
  SPIN_PRIZES.forEach(function(p,i){
    var start=angle+i*arc,end=start+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,start,end);ctx.closePath();
    ctx.fillStyle=p.col;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';
    ctx.font='bold 11px Space Grotesk,sans-serif';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=3;
    ctx.fillText(p.label,R-8,4);
    ctx.restore();
  });
  // Center circle
  ctx.beginPath();ctx.arc(cx,cy,22,0,2*Math.PI);
  ctx.fillStyle='#0a0a14';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fbbf24';ctx.font='bold 13px Space Grotesk,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('⭐',cx,cy);
}
function getSpinPrizeAtAngle(angle){
  var n=SPIN_PRIZES.length,arc=(2*Math.PI)/n;
  var pointer=(-Math.PI/2-angle)%(2*Math.PI);
  if(pointer<0)pointer+=2*Math.PI;
  var idx=Math.floor(pointer/arc)%n;
  return SPIN_PRIZES[idx];
}
function openSpin(){
  var box=document.getElementById('spin-box');
  if(box){box.style.background=T.bg;box.style.color=T.text;}
  document.getElementById('spin-modal').style.display='flex';
  var today=getTodayKey(),spun=S.lastSpinDate===today,extraSpun=S.lastSpinExtra===today;
  document.getElementById('spin-title').textContent=t('spinTitle');
  document.getElementById('spin-result').textContent='';
  var fb=document.getElementById('spin-btn-free'),ab=document.getElementById('spin-btn-ad');
  fb.textContent='⭐ '+(spun?t('spinDone'):t('spinFree'));
  fb.disabled=spun;fb.style.opacity=spun?'.35':'1';
  fb.style.animation=spun?'none':'spinBtnPulse 2s infinite';
  fb.style.background=spun?'':(isNight?'rgba(255,255,255,.12)':'rgba(20,20,40,.08)');
  ab.textContent='📺 '+(extraSpun?t('spinDone'):t('spinWatch'));
  ab.disabled=extraSpun;ab.style.opacity=extraSpun?'.35':'.7';
  spinLocked=false;
  drawSpinWheel(spinAngle);
}
function closeSpin(){
  if(spinAnimId){cancelAnimationFrame(spinAnimId);spinAnimId=null;}
  document.getElementById('spin-modal').style.display='none';
}
function doSpin(useAd){
  var today=getTodayKey();
  if(useAd){
    if(S.lastSpinExtra===today){toast(t('spinDone'));return;}
    showRewardedAd(function(){executeSpin(true);},function(){});
  }else{
    if(S.lastSpinDate===today){toast(t('spinDone'));return;}
    executeSpin(false);
  }
}
function executeSpin(isExtra){
  if(spinLocked)return;
  spinLocked=true;
  document.getElementById('spin-btn-free').disabled=true;
  document.getElementById('spin-btn-ad').disabled=true;
  document.getElementById('spin-result').textContent='';
  var target=Math.random()*2*Math.PI;
  var totalRotation=4*Math.PI*2+target; // ≥4 full turns + landing
  var start=null,duration=4000+Math.random()*1500;
  function easeOut(t){return 1-Math.pow(1-t,3);}
  var startAngle=spinAngle;
  function frame(ts){
    if(!start)start=ts;
    var elapsed=ts-start,progress=Math.min(elapsed/duration,1);
    spinAngle=startAngle+totalRotation*easeOut(progress);
    drawSpinWheel(spinAngle);
    if(progress<1){spinAnimId=requestAnimationFrame(frame);}
    else{
      spinAnimId=null;
      var prize=getSpinPrizeAtAngle(spinAngle);
      applySpinPrize(prize,isExtra);
    }
  }
  spinAnimId=requestAnimationFrame(frame);
}
function applySpinPrize(prize,isExtra){
  var today=getTodayKey();
  var resultEl=document.getElementById('spin-result');
  if(prize.trail){
    var unowned=TRAILS.filter(function(tr){return tr.price>0&&S.ownedTrails.indexOf(tr.id)<0;});
    if(unowned.length>0){
      var won=unowned[Math.floor(Math.random()*unowned.length)];
      S.ownedTrails.push(won.id);
      resultEl.textContent=t('trailUnlocked')+' '+won.name+'!';
    }else{prize={coins:150};resultEl.textContent='+150 ★';}
  }else if(prize.multiplier){
    S.nextGameMultiplier=2;
    resultEl.textContent='🚀 2× coins next game!';
  }else{
    S.coins+=prize.coins;
    resultEl.textContent='+'+prize.label+' ★';
    var ch=document.getElementById('h-coins');if(ch)ch.textContent=S.coins;
    var sc=document.getElementById('sh-coins');if(sc)sc.textContent=S.coins;
  }
  if(isExtra){S.lastSpinExtra=today;}else{S.lastSpinDate=today;}
  saveState();
  var fb=document.getElementById('spin-btn-free'),ab=document.getElementById('spin-btn-ad');
  fb.textContent='⭐ '+(S.lastSpinDate===today?t('spinDone'):t('spinFree'));
  fb.disabled=S.lastSpinDate===today;fb.style.opacity=S.lastSpinDate===today?'.35':'1';
  ab.textContent='📺 '+(S.lastSpinExtra===today?t('spinDone'):t('spinWatch'));
  ab.disabled=S.lastSpinExtra===today;ab.style.opacity=S.lastSpinExtra===today?'.35':'.7';
  spinLocked=false;
}
// Auto-popup: mostrar spin al abrir home si no se ha girado hoy

  if(S.user&&!S.user.isGuest&&S.lastSpinDate!==getTodayKey()){
    setTimeout(openSpin,1200);
  }
}

var zenQuote={text:'',author:'',alpha:0,phase:'idle',timer:0,used:[],px:0,py:0};
function triggerZenQuote(){
  var pool=ZEN_QUOTES.filter(function(_,i){return zenQuote.used.indexOf(i)<0;});
  if(pool.length===0){zenQuote.used=[];pool=ZEN_QUOTES.slice();}
  var pick=pool[Math.floor(Math.random()*pool.length)];
  zenQuote.used.push(ZEN_QUOTES.indexOf(pick));
  var txt=lang==='es'?(pick.es||pick.t):pick.t;
  zenQuote.text=txt;
  zenQuote.author=(pick.a?'— '+pick.a:'');
  zenQuote.alpha=0;zenQuote.phase='in';zenQuote.timer=0;
  // Anchor to current planet position — offset above it
  var ci=circles[orb.on>=0?orb.on:0];
  if(ci){
    var ps=toS(ci.wx,ci.wy);
    var offY=sR(ci.r)+55;
    zenQuote.px=Math.min(Math.max(ps.x,W*.15),W*.85);
    zenQuote.py=Math.min(Math.max(ps.y-offY,H*.12),H*.55);
  }else{
    zenQuote.px=W/2;zenQuote.py=H*.35;
  }
}
function drawZenQuote(){
  if(zenQuote.phase==='idle'||currentMode!=='easy')return;
  var fadeDur=80,holdDur=320; // frames (~5.3s hold at 60fps)
  zenQuote.timer++;
  if(zenQuote.phase==='in'){
    zenQuote.alpha=Math.min(1,zenQuote.timer/fadeDur);
    if(zenQuote.timer>=fadeDur){zenQuote.phase='hold';zenQuote.timer=0;}
  }else if(zenQuote.phase==='hold'){
    zenQuote.alpha=1;
    if(zenQuote.timer>=holdDur){zenQuote.phase='out';zenQuote.timer=0;}
  }else if(zenQuote.phase==='out'){
    zenQuote.alpha=Math.max(0,1-zenQuote.timer/fadeDur);
    if(zenQuote.timer>=fadeDur){zenQuote.phase='idle';zenQuote.alpha=0;return;}
  }
  var lines=zenQuote.text.split('\n');
  var cx=zenQuote.px,cy=zenQuote.py;
  // Text color adapts to theme — shadow creates halo readable on any bg
  var textCol=isNight?'rgba(224,215,255,0.95)':'rgba(20,15,50,0.9)';
  var shadowCol=isNight?'rgba(0,0,0,0.9)':'rgba(255,255,255,0.95)';
  var authorCol=isNight?'rgba(167,139,250,0.75)':'rgba(109,40,217,0.7)';
  ctx.save();
  ctx.globalAlpha=zenQuote.alpha;
  ctx.textAlign='center';
  // Quote text — clean, no frame
  var lineH=19,fs=lines.length>2?12:13;
  ctx.font='300 '+fs+'px "Space Grotesk", sans-serif';
  ctx.shadowColor=shadowCol;ctx.shadowBlur=14;
  ctx.fillStyle=textCol;
  for(var li=0;li<lines.length;li++){
    ctx.fillText(lines[li].trim(),cx,cy+li*lineH);
  }
  // Author — italic, smaller, offset
  if(zenQuote.author){
    ctx.shadowBlur=10;
    ctx.globalAlpha=zenQuote.alpha*.7;
    ctx.font='italic 300 10px "Space Grotesk", sans-serif';
    ctx.fillStyle=authorCol;
    ctx.fillText(zenQuote.author,cx,cy+lines.length*lineH+10);
  }
  ctx.shadowBlur=0;ctx.restore();
}

function rnd(a,b){return a+Math.random()*(b-a);}
var AC;
function snd(ok){
  if(!AC||!soundEnabled)return;
  var N=[261.6,293.7,329.6,392,440,523.3,587.3,659.3];
  var o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  if(ok){o.type='sine';o.frequency.value=N[score%8];g.gain.setValueAtTime(.13,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.4);o.start();o.stop(AC.currentTime+.4);}
  else{o.type='sine';o.frequency.value=180;g.gain.setValueAtTime(.05,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.1);o.start();o.stop(AC.currentTime+.1);}
}
function screenShake(amt){shakeX=(Math.random()-.5)*amt*2;shakeY=(Math.random()-.5)*amt*2;shakeD=amt;}
function burst(wx,wy,col,n){for(var i=0;i<n;i++){var a=Math.PI*2*i/n+rnd(-.3,.3),s=rnd(2,5);parts.push({wx:wx,wy:wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:col,r:rnd(2,4)});}}
function toS(wx,wy){return{x:(wx-camX)*zoom+W/2+shakeX,y:(wy-camY)*zoom+H/2+shakeY};}
function sR(r){return r*zoom;}

function mkCircle(wx,wy,idx,minS,maxS){
  var pal=getPal();minS=minS||.038;maxS=maxS||.058;
  var col=pal[idx%pal.length];
  // Easy mode: checkpoint planets every 10 are golden
  if(currentMode==='easy'&&score>0&&(score+1)%10===0)col='#fbbf24';
  return{wx:wx,wy:wy,r:rnd(58,95),col:col,spd:rnd(minS,maxS)*(Math.random()<.5?1:-1),ang:rnd(0,6.28),alpha:0,shockwave:null};
}
function addNext(){
  var p=circles[circles.length-1];
  var diff=currentMode==='easy'?0:Math.min(score*.016,.8);
  var minD=220+diff*80,maxD=340+diff*140,minS=.038+diff*.035,maxS=.058+diff*.042;
  var wx,wy,tries=0;
  do{var a=rnd(0,6.28),d=rnd(minD,maxD);wx=p.wx+Math.cos(a)*d;wy=p.wy+Math.sin(a)*d;tries++;}
  while(tries<30&&circles.some(function(c){return Math.hypot(wx-c.wx,wy-c.wy)<c.r+80;}));
  var c=mkCircle(wx,wy,circles.length,minS,maxS);circles.push(c);
  if(currentMode!=='easy'&&Math.random()>.45){
    for(var attempt=0;attempt<20;attempt++){
      var t2=rnd(.35,.65),cx=p.wx+(c.wx-p.wx)*t2+rnd(-18,18),cy=p.wy+(c.wy-p.wy)*t2+rnd(-18,18);
      if(!circles.some(function(cc){return Math.hypot(cx-cc.wx,cy-cc.wy)<cc.r+22;})){
        coins_arr.push({wx:cx,wy:cy,r:9,done:false});break;
      }
    }
  }
}

function activateGravField(){
  if(gravFieldActive||phase!=='playing'||orb.on===-1)return;
  if(gravFieldUsed>=gravFieldMax){toast(t('gravLimit'));return;}
  var cost=15+Math.floor(score*0.2);
  var total=S.coins+sesCoins;
  if(total<cost){toast(t('notEnough'));return;}
  if(sesCoins>=cost){sesCoins-=cost;}
  else{var diff2=cost-sesCoins;sesCoins=0;S.coins=Math.max(0,S.coins-diff2);}
  document.getElementById('cv').textContent=Math.floor(sesCoins);saveState();
  gravFieldActive=true;gravFieldUsed++;
  updateGravBtn();
  // Mark next planet with gravity field
  var nextPlanet=circles[circles.length-1];
  if(nextPlanet)nextPlanet.hasGravField=true;
  toast(t('gravActive'));
}
function updateGravBtn(){
  var countEl=document.getElementById('grav-count');
  if(countEl)countEl.textContent=(gravFieldMax-gravFieldUsed);
  if(magnetBtn){
    if(gravFieldUsed>=gravFieldMax){magnetBtn.style.opacity='.25';}
    else{magnetBtn.style.opacity='1';}
    if(gravFieldActive){
      magnetBtn.style.background='rgba(120,80,255,.35)';
      magnetBtn.style.border='1.5px solid rgba(120,80,255,.8)';
      magnetBtn.style.boxShadow='0 0 14px rgba(120,80,255,.4)';

      magnetBtn.style.border='1.5px solid rgba(120,80,255,.5)';
      magnetBtn.style.boxShadow='none';
    }
  }
}
var magnetTimer=0;
var magnetMaxTime=20;
function updateMagnetTimer(dt){
  // Gravity field: pull orb toward next planet if field is active
  if(gravFieldActive&&orb.on===-1){
    var target=circles[circles.length-1];
    if(target&&target.hasGravField){
      var gdist=Math.hypot(orb.wx-target.wx,orb.wy-target.wy);
      if(gdist>0&&gdist<600){
        var pullStr=5.0*(1-gdist/600);
        var gfx=(target.wx-orb.wx)/gdist,gfy=(target.wy-orb.wy)/gdist;
        orb.vx+=gfx*pullStr*dt;orb.vy+=gfy*pullStr*dt;
      }
    }
  }
  // Spawn visual particles around gravity field planet
  if(gravFieldActive){
    var gTarget=circles[circles.length-1];
    if(gTarget&&gTarget.hasGravField&&Math.random()>.7){
      var ga=rnd(0,6.28),gd2=gTarget.r+rnd(20,80);
      gravFieldParts.push({wx:gTarget.wx+Math.cos(ga)*gd2,wy:gTarget.wy+Math.sin(ga)*gd2,
        vx:Math.cos(ga+Math.PI)*1.5,vy:Math.sin(ga+Math.PI)*1.5,life:1,r:rnd(1.5,3)});
    }
  }
  // Update gravity field particles
  for(var gp=gravFieldParts.length-1;gp>=0;gp--){
    var pp=gravFieldParts[gp];
    pp.wx+=pp.vx*dt;pp.wy+=pp.vy*dt;pp.life-=.025*dt;
    if(pp.life<=0)gravFieldParts.splice(gp,1);
  }
}
function showMagnetBtn(show){
  if(!magnetBtn)spawnMagnetBtn();
  magnetBtn.style.display=show?'flex':'none';
  updateGravBtn();
}

function startCharge(){if(phase!=='playing'||orb.on===-1)return;if(tutFrozen){tutTap();return;}charging=true;chargeStart=Date.now();}
function releaseJump(){
  if(!charging)return;charging=false;
  if(phase!=='playing'||orb.on===-1)return;
  if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  if(currentMode==='easy')startZenMusic();else startMusic();
  var held=Math.min(Date.now()-chargeStart,MAX_CHARGE),power=1+(held/MAX_CHARGE)*2.8;
  var c=circles[orb.on],dir=c.spd>0?1:-1;
  var ra=Math.atan2(orb.wy-c.wy,orb.wx-c.wx),ta=ra+Math.PI/2*dir;
  var sp=(Math.abs(c.spd)*c.r*1.2+4.5)*power;
  orb.vx=Math.cos(ta)*sp;orb.vy=Math.sin(ta)*sp;
  orb.lastLaunched=orb.on;orb.graceFrames=10;orb.last=-1;orb.on=-1;
}

function die(){
  if(phase==='dead')return;
  // Easy mode: checkpoint respawn
  if(currentMode==='easy'&&lastCheckpoint>0&&score===lastCheckpoint){
    // Respawn at last checkpoint planet
    score=lastCheckpoint;
    var last=circles[circles.length-1];
    circles=[last];parts=[];coins_arr=[];
    orb={wx:last.wx+last.r,wy:last.wy,vx:0,vy:0,on:0,last:-1,lastLaunched:-1,graceFrames:0,ang:Math.atan2(last.r,0),trail:[],timer:99999,timerMax:99999};
    addNext();
    camX=last.wx;camY=last.wy;tCamX=last.wx;tCamY=last.wy;
    document.getElementById('sc').textContent=score;
    combo=0;
    toast(lang==='es'?'🧘 Checkpoint '+lastCheckpoint:'🧘 Checkpoint '+lastCheckpoint);
    if(navigator.vibrate)navigator.vibrate(15);
    return;
  }
  phase='dead';snd(false);stopMusic();
  hideTut();tutStep=0;tutFrozen=false;
  if(navigator.vibrate)navigator.vibrate([50,30,80]);
  if(currentMode!=='easy'){var mult=S.nextGameMultiplier||1;S.coins+=sesCoins*mult;if(mult>1){toast('🚀 2× coins!');S.nextGameMultiplier=1;}}

    if(score>S.best)S.best=score;
    S.hist.push({score:score,date:new Date().toLocaleDateString()});
    if(S.hist.length>30)S.hist.shift();
    updateRank();
  }
  saveState();
  if(currentMode!=='easy')saveLbEntry();
  deathCount++;
  // Track daily challenge progress
  checkDailyProgress('score',score);
  checkDailyProgress('combo',combo);
  checkDailyProgress('games',1);
  checkDailyProgress('coins',sesCoins);
  // Ask for notification permission after 3rd game
  if(deathCount===1&&!S.user.isGuest&&'Notification' in window&&Notification.permission==='default'){
    setTimeout(function(){requestNotifPermission();},2500);
  }
  document.getElementById('sc').style.display='none';document.getElementById('coins-hud').style.display='none';
  document.getElementById('co').style.opacity='0';document.getElementById('pause-btn').style.display='none';
  showMagnetBtn(false);
  function showDead(){
    document.getElementById('scr-dead').classList.add('on');document.getElementById('scr-dead').style.background=T.bg;
    document.getElementById('d-title').textContent=(score>=S.best&&score>0)?t('newRec'):t('crash');

    document.getElementById('d-earned').textContent=sesCoins;

function update(dt){
  dt=dt||1;if(phase!=='playing')return;dt=Math.min(dt,2.5);
  if(tutFrozen)return;
  // Slow-mo
  if(slowMoTimer>0){slowMoTimer-=1;dt*=slowMoFactor;if(slowMoTimer<=0){slowMoFactor=1;}}
  circles.forEach(function(c){c.ang+=c.spd*dt;c.alpha=Math.min(1,c.alpha+.05*dt);
    if(c.shockwave){c.shockwave.r+=5*dt;c.shockwave.a-=.05*dt;if(c.shockwave.a<=0)c.shockwave=null;}});
  coins_arr.forEach(function(c){c.ang=(c.ang||0)+.04*dt;});
  if(orb.graceFrames>0)orb.graceFrames-=dt;
  if(hitT>0)hitT=Math.max(0,hitT-dt*.15);
  if(shakeD>0.05){shakeX*=.55;shakeY*=.55;shakeD*=.55;}else{shakeX=0;shakeY=0;shakeD=0;}
  {
    coins_arr.forEach(function(cn){
      if(cn.done)return;
      if(Math.hypot(orb.wx-cn.wx,orb.wy-cn.wy)<cn.r+20){cn.done=true;var multiplier=1+combo*0.15;var earned=1*multiplier;sesCoinsFrac+=earned;var whole=Math.floor(sesCoinsFrac);if(whole>0){sesCoins+=whole;sesCoinsFrac-=whole;}document.getElementById('cv').textContent=sesCoins;if(earned>1)showCoinPopup('+'+earned.toFixed(1),cn.wx,cn.wy);burst(cn.wx,cn.wy,'#fbbf24',7);}
    });
    coins_arr=coins_arr.filter(function(c){return !c.done;});
  }
  if(orb.on>=0){
    var c=circles[orb.on];orb.ang+=c.spd*dt;
    orb.wx=c.wx+Math.cos(orb.ang)*c.r;orb.wy=c.wy+Math.sin(orb.ang)*c.r;
    if(orb.timer>0){orb.timer-=(1/60)*dt;if(orb.timer<=0){orb.timer=0;die();return;}}
    var nx=circles[circles.length-1];
    tCamX=(c.wx+nx.wx)/2;tCamY=(c.wy+nx.wy)/2;
    var span=Math.hypot(nx.wx-c.wx,nx.wy-c.wy)+Math.max(c.r,nx.r)*2+80;
    tZoom=Math.min(1.0,Math.min(W,H)*.82/span);
  }else{
    orb.vy+=.22*dt;
    // Easy mode: gravitational pull toward nearest planet
    if(currentMode==='easy'){
      // Only pull toward the NEXT planet (last in array), never the one we left
      var gravTarget=circles[circles.length-1];
      if(gravTarget){
        var gd=Math.hypot(orb.wx-gravTarget.wx,orb.wy-gravTarget.wy);
        if(gd>0&&gd<500){
          var gStr=3.5*(1-gd/500);
          var gdx=(gravTarget.wx-orb.wx)/gd,gdy=(gravTarget.wy-orb.wy)/gd;
          orb.vx+=gdx*gStr*dt;orb.vy+=gdy*gStr*dt;
        }
      }
    }
    orb.wx+=orb.vx*dt;orb.wy+=orb.vy*dt;
    tCamX+=(orb.wx-tCamX)*.09*dt;tCamY+=(orb.wy-tCamY)*.09*dt;
    var landed=false;
    for(var i=0;i<circles.length;i++){
      if(i===orb.on)continue;
      if(orb.graceFrames>0&&i===orb.lastLaunched)continue;
      var ci=circles[i];
      if(Math.hypot(orb.wx-ci.wx,orb.wy-ci.wy)<=ci.r+12){
        orb.ang=Math.atan2(orb.wy-ci.wy,orb.wx-ci.wx);
        orb.wx=ci.wx+Math.cos(orb.ang)*ci.r;orb.wy=ci.wy+Math.sin(orb.ang)*ci.r;
        var impactSpeed=Math.hypot(orb.vx,orb.vy);
        var impactForce=Math.min(impactSpeed/12,1);
        var isMaxImpact=impactForce>.85;
        orb.vx=0;orb.vy=0;orb.lastLaunched=-1;orb.graceFrames=0;orb.last=i;orb.on=i;
        // Softer difficulty curve — min 4s, slower ramp
        orb.timer=(currentMode==='easy')?99999:Math.max(4,10-score*.08);orb.timerMax=orb.timer;
        // Deactivate gravity field on landing
        if(gravFieldActive){gravFieldActive=false;ci.hasGravField=false;gravFieldParts=[];updateGravBtn();}
        hitIdx=i;hitT=1;hitAmt=ci.r*(.18+impactForce*.15);
        ci.shockwave={r:ci.r*(.3+impactForce*.4),a:.9+impactForce*.3};
        // Scale particles with impact force
        var partCount=Math.min(65,Math.max(14,Math.round(12+impactForce*50)));
        var partSpeed=Math.min(12,Math.max(2.5,impactSpeed*.7));
        var partSize=1.5+impactForce*3;
        for(var pi=0;pi<partCount;pi++){
          var pa=Math.PI*2*pi/partCount+rnd(-.5,.5),psp=rnd(1.5,partSpeed);
          var pCol=ci.col;
          // Max impact: add white/gold sparks
          if(isMaxImpact&&pi%3===0)pCol=pi%6===0?'#fbbf24':'#ffffff';
          parts.push({wx:orb.wx,wy:orb.wy,vx:Math.cos(pa)*psp,vy:Math.sin(pa)*psp,life:1,col:pCol,r:rnd(partSize*.5,partSize+impactSpeed*.3)});
        }
        // Max impact: extra ring burst
        if(isMaxImpact){
          for(var ri=0;ri<16;ri++){
            var ra2=Math.PI*2*ri/16;
            parts.push({wx:orb.wx,wy:orb.wy,vx:Math.cos(ra2)*partSpeed*1.3,vy:Math.sin(ra2)*partSpeed*1.3,life:.7,col:'#ffffff',r:rnd(1,2.5)});
          }
        }
        if(i===circles.length-1){
          if(tutStep>0)tutLanded();
          score++;combo++;snd(true);
          screenShake(Math.min(3+score*.15+impactForce*10,16));
          if(navigator.vibrate)navigator.vibrate(score>20?30:15);
          document.getElementById('sc').textContent=score;
          if(currentMode!=='easy'&&score>S.best)S.best=score;
          if(combo>=3){var ce=document.getElementById('co');ce.textContent='x'+combo+' COMBO';ce.style.color=ci.col;ce.style.opacity='1';clearTimeout(ce._t);ce._t=setTimeout(function(){ce.style.opacity='0';},900);}
          checkMilestone();
          // Easy mode checkpoint every 10
          if(currentMode==='easy'&&score%10===0&&score!==lastCheckpoint){
            lastCheckpoint=score;
            showMilestonePop('CHECKPOINT '+score,score);
            setTimeout(triggerZenQuote,1200); // quote appears after checkpoint flash
          }
          while(circles.length>3){circles.shift();if(orb.on>0)orb.on--;if(orb.lastLaunched>0)orb.lastLaunched--;i=Math.max(0,i-1);}
          addNext();
        }else{combo=0;document.getElementById('co').style.opacity='0';}
        landed=true;break;
      }
    }
    if(!landed){
      var ss=toS(orb.wx,orb.wy);
      if(ss.x<-80||ss.x>W+80||ss.y<-80||ss.y>H+80)die();
      else{
        var closest=Infinity;
        for(var ci2=0;ci2<circles.length;ci2++){
          if(ci2===orb.lastLaunched&&orb.graceFrames>0)continue;
          var dd=Math.hypot(orb.wx-circles[ci2].wx,orb.wy-circles[ci2].wy)-circles[ci2].r;
          if(dd<closest)closest=dd;
        }
        if(closest>600)die();
      }
    }
  }
  var zBoost=(zenQuote.phase!=='idle'&&currentMode==='easy')?0.07*zenQuote.alpha:0;
  camX+=(tCamX-camX)*.07*dt;camY+=(tCamY-camY)*.07*dt;zoom+=(tZoom+zBoost-zoom)*.06*dt;
  orb.trail.push({wx:orb.wx,wy:orb.wy});if(orb.trail.length>40)orb.trail.shift();
  parts.forEach(function(p){p.wx+=p.vx*dt;p.wy+=p.vy*dt;p.vx*=Math.pow(.91,dt);p.vy*=Math.pow(.91,dt);p.vy+=.07*dt;p.life-=.028*dt;});
  parts=parts.filter(function(p){return p.life>0;});
  updateMagnetTimer(dt);
}

function drawTrail(){
  for(var i=0;i<orb.trail.length;i++){
    var pt=orb.trail[i],prog=i/orb.trail.length,s=toS(pt.wx,pt.wy),r=Math.max(.4,sR(15)*prog),a=prog*.45;
    ctx.save();var tr=S.trail;
    if(tr==='simple'){ctx.globalAlpha=a;ctx.beginPath();ctx.arc(s.x,s.y,r,0,6.28);ctx.fillStyle=T.orbCol;ctx.fill();}
    else if(tr==='rainbow'){ctx.globalAlpha=a;ctx.beginPath();ctx.arc(s.x,s.y,r*1.2,0,6.28);ctx.fillStyle='hsl('+(prog*360)+',90%,70%)';ctx.fill();}
    else if(tr==='stars'&&i%3===0){var sz=Math.max(12,r*3.5);ctx.globalAlpha=a*1.8;ctx.font=sz+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✦',s.x,s.y);}    else if(tr==='fire'){ctx.globalAlpha=a*1.2;ctx.beginPath();ctx.arc(s.x,s.y,r*1.5,0,6.28);ctx.fillStyle='hsl('+(20+prog*40)+',100%,60%)';ctx.fill();}
    else if(tr==='ghost'){ctx.globalAlpha=a*.4;ctx.beginPath();ctx.arc(s.x,s.y,r*2,0,6.28);ctx.fillStyle='rgba(200,200,255,1)';ctx.fill();}
    else if(tr==='bubbles'&&i%2===0){var bx=s.x+Math.sin(i*1.7)*r*1.5,by=s.y+Math.cos(i*2.3)*r*1.5,br=Math.max(3,r*(0.6+Math.sin(i*.8)*.4));ctx.globalAlpha=a*.7;ctx.beginPath();ctx.arc(bx,by,br,0,6.28);var bCol='hsl('+(prog*60+190)+',60%,'+(isNight?'65%':'45%')+')';ctx.strokeStyle=bCol;ctx.lineWidth=1.2;ctx.stroke();ctx.globalAlpha=a*.15;ctx.fillStyle=bCol;ctx.fill();}
    else if(tr==='neon'){ctx.globalAlpha=a*1.5;ctx.beginPath();ctx.arc(s.x,s.y,r*1.3,0,6.28);var nc='hsl('+(prog*120+180)+',100%,65%)';ctx.fillStyle=nc;ctx.fill();ctx.shadowColor=nc;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(s.x,s.y,r*.6,0,6.28);ctx.fillStyle='#fff';ctx.fill();ctx.shadowBlur=0;}
    else if(tr==='plasma'){var px=s.x+Math.sin(i*.9+Date.now()*.003)*r*.8,py=s.y+Math.cos(i*1.1+Date.now()*.002)*r*.8;ctx.globalAlpha=a*1.2;ctx.beginPath();ctx.arc(px,py,r*1.4,0,6.28);ctx.fillStyle='hsl('+(prog*200+Date.now()*.02%360)+',80%,55%)';ctx.fill();}
    else if(tr==='void'){ctx.globalAlpha=a*.8;ctx.beginPath();ctx.arc(s.x,s.y,r*2,0,6.28);ctx.fillStyle='rgba(0,0,0,.6)';ctx.fill();ctx.globalAlpha=a*.5;ctx.beginPath();ctx.arc(s.x,s.y,r*.5,0,6.28);ctx.fillStyle='#8b5cf6';ctx.fill();}
    else if(tr==='lightning'&&i>0){
      // Electric bolts that wrap around the projectile
      var prev=orb.trail[i-1],ps3=toS(prev.wx,prev.wy);
      var time=Date.now()*.005;
      // Main bolt - jagged with alternating yellow/white
      var segments=3;
      for(var seg=0;seg<segments;seg++){
        var t1=seg/segments,t2=(seg+1)/segments;
        var mx1=ps3.x+(s.x-ps3.x)*t1,my1=ps3.y+(s.y-ps3.y)*t1;
        var mx2=ps3.x+(s.x-ps3.x)*t2,my2=ps3.y+(s.y-ps3.y)*t2;
        var jitter=r*2.5*(1-prog*.3);
        var ox=(Math.random()-.5)*jitter,oy=(Math.random()-.5)*jitter;
        var boltCol=(seg+Math.floor(time*3+i))%2===0?'rgba(255,240,80,'+(a*1.8)+')':'rgba(255,255,255,'+(a*1.6)+')';
        ctx.globalAlpha=1;ctx.beginPath();ctx.moveTo(mx1,my1);ctx.lineTo(mx2+ox,my2+oy);
        ctx.strokeStyle=boltCol;ctx.lineWidth=1.5+prog*2.5;ctx.stroke();

        ctx.globalAlpha=a*.4;ctx.lineWidth=4+prog*5;ctx.strokeStyle='rgba(255,220,50,'+(a*.5)+')';
        ctx.beginPath();ctx.moveTo(mx1,my1);ctx.lineTo(mx2+ox,my2+oy);ctx.stroke();
      }
      // Side bolts that branch off  
      if(i%3===0&&prog>.2){
        var ba2=time*4+i*1.7;
        var bx2=s.x+Math.cos(ba2)*r*3,by2=s.y+Math.sin(ba2)*r*3;

    }
    else if(tr==='sakura'){
      var sakT=Date.now()*.001;

      var sakHue=330+prog*25;
      ctx.globalAlpha=a*1.0;ctx.beginPath();ctx.arc(s.x,s.y,sakR,0,6.28);

      ctx.fillStyle='rgba(255,255,255,'+(a*.6)+')';ctx.fill();

      if(i%2===0){
        var np=2;
        for(var sp=0;sp<np;sp++){
          var spA=sakT*1.2+i*1.7+sp*3.14;
          var spDist=sakR*(1.2+Math.sin(spA*.8+sp)*.8);
          var spX=s.x+Math.cos(spA)*spDist;
          var spY=s.y+Math.sin(spA*.6)*spDist+Math.sin(sakT+i*.5)*r*.4;

        }
      }
    }
    ctx.restore();
  }
}

    if(i===circles.length-1){var dx=ci.wx+Math.cos(ci.ang)*ci.r,dy=ci.wy+Math.sin(ci.ang)*ci.r,ds=toS(dx,dy);ctx.globalAlpha=ci.alpha;ctx.beginPath();ctx.arc(ds.x,ds.y,5,0,6.28);ctx.fillStyle=ci.col+'ee';ctx.fill();}
    ctx.restore();
  }
  for(var j=0;j<coins_arr.length;j++){var cn=coins_arr[j];if(cn.done)continue;var cs=toS(cn.wx,cn.wy),cr=sR(cn.r);ctx.beginPath();ctx.arc(cs.x,cs.y,cr,0,6.28);ctx.fillStyle='#fbbf24';ctx.fill();ctx.beginPath();ctx.arc(cs.x,cs.y,cr*.45,0,6.28);ctx.fillStyle='#fde68a';ctx.fill();}
  drawTrail();
  for(var k=0;k<parts.length;k++){var p=parts[k],ps=toS(p.wx,p.wy);ctx.save();ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(ps.x,ps.y,p.r*p.life,0,6.28);ctx.fillStyle=p.col;ctx.fill();ctx.restore();}
  if(charging&&orb.on>=0){var held=Math.min(Date.now()-chargeStart,MAX_CHARGE),pct2=held/MAX_CHARGE,os=toS(orb.wx,orb.wy);ctx.beginPath();ctx.arc(os.x,os.y,sR(16)+38*pct2,0,6.28);ctx.strokeStyle='rgba(255,200,50,'+(.3+pct2*.6)+')';ctx.lineWidth=2+pct2*3;ctx.stroke();}
  var os2=toS(orb.wx,orb.wy),or2=sR(16);
  // Draw gravity field visual on target planet
  if(gravFieldActive){
    var gfTarget=circles[circles.length-1];
    if(gfTarget&&gfTarget.hasGravField){
      var gs=toS(gfTarget.wx,gfTarget.wy),gr=sR(gfTarget.r);
      var gPulse=.15+Math.sin(Date.now()*.004)*.1;
      ctx.globalAlpha=gPulse;ctx.beginPath();ctx.arc(gs.x,gs.y,gr+sR(60),0,6.28);
      ctx.strokeStyle='rgba(167,139,250,.5)';ctx.lineWidth=2;ctx.stroke();
      ctx.globalAlpha=gPulse*.5;ctx.beginPath();ctx.arc(gs.x,gs.y,gr+sR(40),0,6.28);
      ctx.fillStyle='rgba(167,139,250,.08)';ctx.fill();
    }
    for(var gpi=0;gpi<gravFieldParts.length;gpi++){
      var gpp=gravFieldParts[gpi],gps=toS(gpp.wx,gpp.wy);
      ctx.globalAlpha=gpp.life*.6;ctx.beginPath();ctx.arc(gps.x,gps.y,gpp.r*gpp.life,0,6.28);
      ctx.fillStyle='rgba(167,139,250,.8)';ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.beginPath();ctx.arc(os2.x,os2.y,or2,0,6.28);ctx.fillStyle=T.orbCol;ctx.fill();
  var pal2=getPal();ctx.beginPath();ctx.arc(os2.x,os2.y,or2*.5,0,6.28);ctx.fillStyle=pal2[score%pal2.length];ctx.fill();
  // Cosmic Reflections — drawn last so it's always on top
  drawZenQuote();
}
function loop(ts){var dt=Math.min((ts-lastT)/16.67,3);lastT=ts;draw();update(dt);requestAnimationFrame(loop);}
