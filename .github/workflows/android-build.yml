name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (www/)
        run: |
          mkdir -p www
          cp index.html manifest.json sw.js firebase-messaging-sw.js icon-192.png icon-512.png www/
          cp -r assets www/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: orbit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && secrets.KEYSTORE_BASE64 != ''
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (www/)
        run: |
          mkdir -p www
          cp index.html manifest.json sw.js firebase-messaging-sw.js icon-192.png icon-512.png www/
          cp -r assets www/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/orbit-release.keystore

      - name: Build Release AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          KEYSTORE_FILE: orbit-release.keystore
          KEY_ALIAS: orbit
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: orbit-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
