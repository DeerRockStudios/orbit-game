<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.25"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <!-- Orbit ring -->
  <ellipse cx="256" cy="256" rx="145" ry="38" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.6" transform="rotate(-20,256,256)" filter="url(#glow)"/>
  <!-- Stars background -->
  <circle cx="80" cy="90" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="430" cy="120" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="400" cy="400" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="390" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="460" cy="260" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="55" cy="260" r="2" fill="#a78bfa" opacity="0.6"/>
  <!-- Main orb -->
  <circle cx="256" cy="256" r="100" fill="url(#orb)" filter="url(#softglow)"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.8"/>
  <!-- Inner shine -->
  <ellipse cx="230" cy="220" rx="30" ry="18" fill="#fff" opacity="0.15"/>
  <!-- Star/pass icon inside -->
  <polygon points="256,186 267,226 310,226 276,250 288,290 256,267 224,290 236,250 202,226 245,226" fill="#fbbf24" opacity="0.95" filter="url(#glow)"/>
  <!-- Orbit dot -->
  <circle cx="401" cy="218" r="10" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="401" cy="218" r="5" fill="#fff"/>
</svg>
